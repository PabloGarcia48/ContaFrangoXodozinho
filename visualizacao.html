<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizacao da Lista - Frango Xodozinho</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card hero viewer-hero">
        <div class="hero-copy">
          <p class="eyebrow">Pagina 2</p>
          <h1>Tela do Cliente</h1>
          <p class="lead">
            Mantenha esta pagina aberta para acompanhar as quantidades sendo
            atualizadas instantaneamente.
          </p>

          <nav class="nav-links">
            <a class="nav-link" href="index.html">Voltar ao controle</a>
            <!-- <a class="nav-link active" href="visualizacao.html">Visualizacao</a> -->
          </nav>
        </div>

        <div class="hero-side">
          <div class="brand-badge">
            <img
              class="brand-logo"
              src="assets/logoXodozinho.jpeg"
              alt="Logo Assados Xodozinho"
            />
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Produtos</h2>
          <span id="total-items" class="total-items">0 itens</span>
        </div>
        <div id="viewer-list" class="viewer-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
