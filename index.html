<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle - Frango Xodozinho</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card hero">
        <div class="hero-copy">
          <p class="eyebrow">Pagina 1</p>
          <h1>Tela de Controle</h1>
          <p class="lead">
            Adicione itens e ajuste a quantidade rapidamente. A outra pagina
            atualiza instantaneamente.
          </p>

          <nav class="nav-links">
            <!-- <a class="nav-link active" href="index.html">Controle</a> -->
            <a class="nav-link" href="visualizacao.html" target="_blank" rel="noopener noreferrer">
              Tela do Cliente
            </a>
          </nav>
        </div>

        <div class="hero-side">
          <div class="brand-badge">
            <img
              class="brand-logo"
              src="assets/logoXodozinho.jpeg"
              alt="Logo Assados Xodozinho"
            />
          </div>
        </div>
      </section>

      <section class="card form-card">
        <form id="product-form" class="product-form">
          <label for="product-name" class="label">Novo produto</label>
          <div class="form-row">
            <input
              id="product-name"
              name="product-name"
              type="text"
              placeholder="Ex.: Coxinha"
              autocomplete="off"
              required
            />
            <button type="submit">Adicionar</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Lista atual</h2>
          <button id="clear-all" class="ghost-button" type="button">
            Limpar tudo
          </button>
        </div>
        <div id="product-list" class="product-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
